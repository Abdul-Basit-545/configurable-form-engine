mcs.metadata:
  componentName: Microsoft Dataverse - Add a new row to selected environment
kind: TaskDialog
inputs:
  - kind: ManualTaskInput
    propertyName: organization
    value: current

  - kind: ManualTaskInput
    propertyName: entityName
    value: mab_formrules

  - kind: AutomaticTaskInput
    propertyName: item.'mab_name'
    description: Short rule name e.g. "Hide Credit Limit on Create"

  - kind: AutomaticTaskInput
    propertyName: item.'mab_elementtype'
    description: "Choice: Field=734000000, Tab=734000001, Section=734000002, Form=734000003"

  - kind: AutomaticTaskInput
    propertyName: item.'mab_elementname'
    description: Logical name of the field/tab/section e.g. description

  - kind: AutomaticTaskInput
    propertyName: item.'mab_setvisibility'
    description: "Choice: NoChange=734000000, Show=734000001, Hide=734000002"

  - kind: AutomaticTaskInput
    propertyName: item.'mab_setrequirement'
    description: "Choice: NoChange=734000000, Required=734000001, Optional=734000002"

  - kind: AutomaticTaskInput
    propertyName: item.'mab_seteditability'
    description: "Choice: NoChange=734000000, Editable=734000001, ReadOnly=734000002"

  - kind: AutomaticTaskInput
    propertyName: item.'mab_applieson'
    description: "Choice: Create=734000000, Update=734000001, Both=734000002"

  - kind: AutomaticTaskInput
    propertyName: item.'mab_conditionmatch'
    description: "Choice: All_AND=734000000, Any_OR=734000001"

  - kind: AutomaticTaskInput
    propertyName: item.'mab_priority'
    description: Integer — lower fires first e.g. 50

  - kind: AutomaticTaskInput
    propertyName: item.'mab_active'
    description: Boolean — true to enable the rule immediately

  - kind: AutomaticTaskInput
    propertyName: item.'mab_managedtableid@odata.bind'
    description: "OData bind path to the parent managed table. Format: /mab_managedtables(guid) — look up the GUID with List rows first, then prefix with /mab_managedtables( and suffix with )"
    inputSettings: {}

modelDisplayName: CFE - Create Form Rule
modelDescription: Creates a mab_formrule record in the Configurable Form Engine. Use this tool (not the generic Add row) when creating a form rule. For managedTableId supply only the bare GUID of the parent mab_managedtable record.
