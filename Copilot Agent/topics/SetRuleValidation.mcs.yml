mcs.metadata:
  componentName: Set Rule Validation
  description: Adds or updates field validation on an existing CFE form rule.
kind: AdaptiveDialog
modelDescription: Adds or updates input validation (alpha only, numeric only, email, no future/past date, max length, regex) on an existing CFE form rule by updating its mab_formrule record.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Set Rule Validation
    triggerQueries:
      - add validation to a rule
      - set validation on a field
      - validate field input
      - add email validation
      - add regex validation
      - add max length validation
      - restrict field to numbers only
      - restrict field to letters only
      - no future date
      - no past date

  actions:
    - kind: Question
      id: askRuleId
      variable: init:Topic.RuleId
      prompt: What is the **Rule ID** (GUID) of the rule to add validation to?
      entity: StringPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: true

    - kind: SetVariable
      id: setCleanRuleId
      variable: init:Topic.CleanRuleId
      value: '=Lower(Substitute(Substitute(Trim(Topic.RuleId), "{", ""), "}", ""))'

    - kind: Question
      id: askValType
      variable: init:Topic.ValType
      prompt: "What type of validation?\n• **alpha** — letters only\n• **numeric** — numbers only\n• **email** — valid email\n• **nofuturedate** — no future dates\n• **nopastdate** — no past dates\n• **maxlength** — max character count\n• **regex** — custom regex pattern"
      entity: StringPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: true

    - kind: SetVariable
      id: setValTypeValue
      variable: init:Topic.ValTypeValue
      value: '=Switch(Substitute(Lower(Trim(Topic.ValType)), " ", ""), "alpha", 734000000, "alphaonly", 734000000, "numeric", 734000001, "numericonly", 734000001, "email", 734000002, "nofuturedate", 734000003, "nopastdate", 734000004, "maxlength", 734000005, "regex", 734000006, 734000000)'

    - kind: Question
      id: askValParam
      variable: init:Topic.ValParam
      prompt: "Enter the **parameter** for this validation (max character count for maxlength, regex pattern for regex, optional max digit count for numeric — or type **none** if not applicable)."
      entity: StringPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: true

    - kind: SetVariable
      id: setCleanParam
      variable: init:Topic.CleanParam
      value: '=If(Lower(Trim(Topic.ValParam)) = "none", Blank(), Trim(Topic.ValParam))'

    - kind: ConditionGroup
      id: checkMaxLengthParam
      conditions:
        - id: maxLengthNeedsParam
          condition: =And(Topic.ValTypeValue = 734000005, IsBlank(Topic.CleanParam))
          actions:
            - kind: SendActivity
              id: sendParamRequired
              activity:
                text:
                  - "⚠️ **maxlength** validation needs a number as its parameter (the maximum character count). Please start over and provide one."
            - kind: EndDialog
              id: endParamRequired

    - kind: Question
      id: askConfirm
      variable: init:Topic.Confirm
      prompt: "I'll set **{Topic.ValType}** validation on rule `{Topic.CleanRuleId}`{If(IsBlank(Topic.CleanParam), \"\", Concatenate(\" with parameter: \", Topic.CleanParam))}. Proceed?"
      entity: BooleanPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: true

    - kind: ConditionGroup
      id: checkConfirm
      conditions:
        - id: confirmed
          condition: =Topic.Confirm = true
          actions:
            - kind: InvokeConnectorAction
              id: updateRule
              displayName: Update mab_formrule with validation
              connectionReference: mab_CFEAgent.shared_commondataserviceforapps.a0ac2eff6ed9427c970a6e4af7fa277c
              connectionProperties:
                mode: Invoker
              operationId: UpdateOnlyRecordWithOrganization
              input:
                binding:
                  organization: https://orgf7fa940a.crm4.dynamics.com
                  entityName: mab_formrules
                  recordId: =Topic.CleanRuleId
                  item/mab_validationtype: =Topic.ValTypeValue
                  item/mab_validationparam: =Topic.CleanParam

            - kind: SendActivity
              id: sendUpdated
              activity:
                text:
                  - "✅ **{Topic.ValType}** validation set on rule `{Topic.CleanRuleId}`. The user gets instant feedback on the field as they type."

      elseActions:
        - kind: SendActivity
          id: sendCancelled
          activity:
            text:
              - Cancelled. The rule was not changed.
